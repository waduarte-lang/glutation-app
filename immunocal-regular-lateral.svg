<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <!-- Fondo degradado -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#172554;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c1829;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#172554;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="400" fill="url(#grad2)"/>
  
  <!-- Caja girada (perspectiva lateral) -->
  <filter id="shadow">
    <feDropShadow dx="4" dy="4" stdDeviation="3" flood-opacity="0.4"/>
  </filter>
  
  <!-- Caja lateral con rotación -->
  <g transform="perspective(800px) rotateY(-25deg)">
    <rect x="55" y="80" width="200" height="250" rx="8" fill="url(#boxGrad2)" filter="url(#shadow)"/>
    <rect x="55" y="80" width="200" height="15" rx="8" fill="#0f172a" opacity="0.8"/>
    <line x1="55" y1="200" x2="255" y2="200" stroke="#0c1829" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Texto del producto lateral -->
  <text x="150" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#94a3b8" text-anchor="middle">IMMUNOCAL</text>
  <text x="150" y="175" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Regular</text>
  
  <!-- Efecto de profundidad -->
  <circle cx="150" cy="245" r="25" fill="#1e40af" opacity="0.15"/>
  <text x="150" y="255" font-family="Arial, sans-serif" font-size="35" text-anchor="middle" fill="#334155">⚡</text>
  
  <!-- Información lateral -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Vista Lateral</text>
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Pasa el mouse</text>
</svg>