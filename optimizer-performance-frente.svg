<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <!-- Fondo con energía -->
  <defs>
    <linearGradient id="gradPerf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="boxGradPerf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:1" />
    </linearGradient>
    <filter id="energyGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f97316" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <rect width="300" height="400" fill="url(#gradPerf)"/>
  
  <!-- Caja energética -->
  <rect x="50" y="80" width="200" height="250" rx="8" fill="url(#boxGradPerf)" filter="url(#energyGlow)"/>
  
  <!-- Borde superior rojo puro energía -->
  <rect x="50" y="80" width="200" height="18" rx="8" fill="#dc2626" opacity="0.7"/>
  
  <!-- Línea de separación -->
  <line x1="50" y1="200" x2="250" y2="200" stroke="#0c0a0a" stroke-width="2" opacity="0.4"/>
  
  <!-- Texto del producto -->
  <text x="150" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">OPTIMIZER</text>
  <text x="150" y="170" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fee2e2" text-anchor="middle">PERFORMANCE</text>
  
  <!-- Icono de energía (rayo) -->
  <circle cx="150" cy="240" r="32" fill="#f97316" opacity="0.25"/>
  <text x="150" y="258" font-family="Arial, sans-serif" font-size="50" text-anchor="middle" fill="#feda03">⚡</text>
  
  <!-- Información -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">14 Sobres - Energía Pura</text>
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="11" fill="#fecaca" text-anchor="middle">Cafeína Natural 100%</text>
</svg>