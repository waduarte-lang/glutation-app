<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <!-- Fondo café oscuro -->
  <defs>
    <linearGradient id="gradCafe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#3f2415;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="boxGradCafe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a16207;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#78350f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a3a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="400" fill="url(#gradCafe)"/>
  
  <!-- Caja café -->
  <filter id="shadowCafe">
    <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.3"/>
  </filter>
  
  <rect x="50" y="80" width="200" height="250" rx="8" fill="url(#boxGradCafe)" filter="url(#shadowCafe)"/>
  
  <!-- Borde superior café claro -->
  <rect x="50" y="80" width="200" height="18" rx="8" fill="#d97706" opacity="0.6"/>
  
  <!-- Línea de separación -->
  <line x1="50" y1="200" x2="250" y2="200" stroke="#3f2415" stroke-width="2" opacity="0.4"/>
  
  <!-- Texto del producto -->
  <text x="150" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fef3c7" text-anchor="middle">IMMUNOTEC</text>
  <text x="150" y="172" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fcd34d" text-anchor="middle">CAFÉ</text>
  
  <!-- Icono café -->
  <circle cx="150" cy="240" r="30" fill="#78350f" opacity="0.2"/>
  <text x="150" y="255" font-family="Arial, sans-serif" font-size="45" text-anchor="middle" fill="#d97706">☕</text>
  
  <!-- Información -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#fef3c7" text-anchor="middle">Café Verde + Hongos</text>
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="11" fill="#fcd34d" text-anchor="middle">100% Colombiano</text>
</svg>