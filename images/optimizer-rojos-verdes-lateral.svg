<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <!-- Fondo oscuro con colores tierra -->
  <defs>
    <linearGradient id="gradOptLat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#14532d;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="boxGradOptLat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="400" fill="url(#gradOptLat)"/>
  
  <!-- Caja girada -->
  <filter id="shadowLat">
    <feDropShadow dx="4" dy="4" stdDeviation="4" flood-opacity="0.3"/>
  </filter>
  
  <g transform="perspective(800px) rotateY(20deg)">
    <rect x="50" y="80" width="200" height="250" rx="8" fill="url(#boxGradOptLat)" filter="url(#shadowLat)"/>
    <rect x="50" y="80" width="100" height="20" rx="8" fill="#22c55e" opacity="0.5"/>
    <rect x="150" y="80" width="100" height="20" rx="8" fill="#15803d" opacity="0.5"/>
  </g>
  
  <!-- Texto lateral -->
  <text x="150" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dcfce7" text-anchor="middle">OPTIMIZER</text>
  <text x="150" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#bbf7d0" text-anchor="middle">Rojos y Verdes</text>
  
  <!-- Icono lateral -->
  <circle cx="150" cy="245" r="30" fill="#15803d" opacity="0.2"/>
  <text x="150" y="260" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="#15803d">🥬</text>
  
  <!-- Información -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#dcfce7" text-anchor="middle">Vista Lateral</text>
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="10" fill="#bbf7d0" text-anchor="middle">Potencia Antioxidante</text>
</svg>