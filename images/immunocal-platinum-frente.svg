<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <!-- Fondo degradado premium -->
  <defs>
    <linearGradient id="gradPlat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="boxGradPlat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="400" fill="url(#gradPlat)"/>
  
  <!-- Efecto de brillo premium -->
  <filter id="glow">
    <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#fbbf24" flood-opacity="0.4"/>
  </filter>
  
  <!-- Caja principal premium -->
  <rect x="50" y="80" width="200" height="250" rx="8" fill="url(#boxGradPlat)" filter="url(#glow)"/>
  
  <!-- Borde brillante superior -->
  <rect x="50" y="80" width="200" height="20" rx="8" fill="url(#goldShine)"/>
  
  <!-- Línea de separación -->
  <line x1="50" y1="200" x2="250" y2="200" stroke="#dc2626" stroke-width="2" opacity="0.4"/>
  
  <!-- Texto del producto -->
  <text x="150" y="150" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#78350f" text-anchor="middle">IMMUNOCAL</text>
  <text x="150" y="175" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#b45309" text-anchor="middle">PLATINUM</text>
  
  <!-- Icono premium (estrella) -->
  <circle cx="150" cy="240" r="28" fill="#fbbf24" opacity="0.2"/>
  <text x="150" y="252" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="#f59e0b">⭐</text>
  
  <!-- Información -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#92400e" text-anchor="middle">30 Sobres Premium</text>
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="11" fill="#b45309" text-anchor="middle">CMP + RMF Incluido</text>
  
  <!-- Marca de premium -->
  <text x="200" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fbbf24">✓</text>
</svg>