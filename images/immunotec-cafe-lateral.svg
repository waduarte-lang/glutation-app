<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <!-- Fondo café muy oscuro -->
  <defs>
    <linearGradient id="gradCafeLat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3f2415;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1f1812;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="boxGradCafeLat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5a3a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3f2415;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="400" fill="url(#gradCafeLat)"/>
  
  <!-- Caja girada -->
  <filter id="shadowCafeLat">
    <feDropShadow dx="4" dy="4" stdDeviation="4" flood-opacity="0.35"/>
  </filter>
  
  <g transform="perspective(800px) rotateY(25deg)">
    <rect x="50" y="80" width="200" height="250" rx="8" fill="url(#boxGradCafeLat)" filter="url(#shadowCafeLat)"/>
    <rect x="50" y="80" width="200" height="18" rx="8" fill="#3f2415" opacity="0.7"/>
  </g>
  
  <!-- Texto lateral -->
  <text x="150" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fed7aa" text-anchor="middle">IMMUNOTEC</text>
  <text x="150" y="170" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">CAFÉ</text>
  
  <!-- Icono lateral -->
  <circle cx="150" cy="245" r="30" fill="#3f2415" opacity="0.2"/>
  <text x="150" y="260" font-family="Arial, sans-serif" font-size="45" text-anchor="middle" fill="#5a3a1a">☕</text>
  
  <!-- Información -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#fed7aa" text-anchor="middle">Vista Lateral</text>
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Ritual Diferente</text>
</svg>