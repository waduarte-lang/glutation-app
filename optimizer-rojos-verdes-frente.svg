<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <!-- Fondo con colores vivos -->
  <defs>
    <linearGradient id="gradOpt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#16a34a;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="boxGradOpt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="400" fill="url(#gradOpt)"/>
  
  <!-- Efecto de brillantez antioxidante -->
  <filter id="glowOpt">
    <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.3"/>
  </filter>
  
  <!-- Caja con colores vibrantes -->
  <rect x="50" y="80" width="200" height="250" rx="8" fill="url(#boxGradOpt)" filter="url(#glowOpt)"/>
  
  <!-- Borde superior dividido -->
  <rect x="50" y="80" width="100" height="20" rx="8" fill="#dc2626" opacity="0.6"/>
  <rect x="150" y="80" width="100" height="20" rx="8" fill="#22c55e" opacity="0.6"/>
  
  <!-- Línea de separación -->
  <line x1="50" y1="200" x2="250" y2="200" stroke="#ca8a04" stroke-width="2" opacity="0.4"/>
  
  <!-- Texto del producto -->
  <text x="150" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">OPTIMIZER</text>
  <text x="150" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fef08a" text-anchor="middle">Rojos y Verdes</text>
  
  <!-- Icono antioxidante -->
  <circle cx="150" cy="240" r="30" fill="#22c55e" opacity="0.2"/>
  <text x="150" y="255" font-family="Arial, sans-serif" font-size="42" text-anchor="middle" fill="#22c55e">🥬</text>
  
  <!-- Información -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">50+ Frutas y Vegetales</text>
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="11" fill="#fef3c7" text-anchor="middle">Antioxidante Natural</text>
</svg>