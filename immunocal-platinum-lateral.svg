<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <!-- Fondo oscuro -->
  <defs>
    <linearGradient id="gradPlatLat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="boxGradPlatLat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="400" fill="url(#gradPlatLat)"/>
  
  <!-- Caja girada (perspectiva lateral) -->
  <filter id="shadow">
    <feDropShadow dx="5" dy="4" stdDeviation="4" flood-opacity="0.35"/>
  </filter>
  
  <g transform="perspective(800px) rotateY(25deg)">
    <rect x="50" y="80" width="200" height="250" rx="8" fill="url(#boxGradPlatLat)" filter="url(#shadow)"/>
    <rect x="50" y="80" width="200" height="20" rx="8" fill="#dc2626" opacity="0.3"/>
    <line x1="50" y1="200" x2="250" y2="200" stroke="#78350f" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Texto lateral -->
  <text x="150" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#78350f" text-anchor="middle">IMMUNOCAL</text>
  <text x="150" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#92400e" text-anchor="middle">PLATINUM</text>
  
  <!-- Icono lateral -->
  <circle cx="150" cy="245" r="28" fill="#dc2626" opacity="0.15"/>
  <text x="150" y="257" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="#b45309">⭐</text>
  
  <!-- Información -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#78350f" text-anchor="middle">Vista Lateral</text>
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">Versión Premium</text>
</svg>